services:
  backend:
    ports: !override
      - "0.0.0.0:${BACKEND_PORT:-${API_PORT:-${SERVER_PORT:-${PORT:-8080}}}}:8080"
      # Origin/cookie config (FRONTEND_ORIGIN, CORS_ALLOWED_ORIGINS,
      # COOKIE_DOMAIN, MULTICA_PUBLIC_URL, GOOGLE_REDIRECT_URI) lives in .env —
      # selfhost.yml already wires each as ${VAR}. Don't hardcode them here, or
      # this file (last in the -f chain) would shadow .env.
  frontend:
    ports: !override
      - "0.0.0.0:${FRONTEND_PORT:-3000}:3000"
